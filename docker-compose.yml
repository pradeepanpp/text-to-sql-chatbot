# docker-compose.yml
# One-command startup: docker compose up
#
# Services:
#   api       — FastAPI on :8000
#   dashboard — Streamlit on :8501
#
# Usage:
#   docker compose up              # start both
#   docker compose up api          # API only
#   docker compose logs -f api     # stream logs
#   docker compose down            # stop

version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: text-to-sql-api
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./data/eval:/app/data/eval
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - PORT=8000
      - HOST=0.0.0.0
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: text-to-sql-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped